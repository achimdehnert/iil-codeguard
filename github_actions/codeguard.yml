name: codeguard

# Drop into .github/workflows/codeguard.yml in any IIL Platform repo to enable
# automatic compliance checking on every PR + push to main.
#
# Uploads SARIF to GitHub Code Scanning so violations show up inline in PR diffs.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write   # needed to upload SARIF
  pull-requests: read

jobs:
  audit:
    name: codeguard audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install iil-codeguard
        run: pip install iil-codeguard

      - name: Run codeguard audit (SARIF)
        run: codeguard audit . --format sarif -o codeguard.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeguard.sarif
          category: iil-codeguard

      - name: Run codeguard with exit-code (gate)
        run: |
          codeguard audit . --format text \
            --severity-threshold error --exit-code
